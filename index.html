  .segment { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .segment button {

  .tile .unit { color: var(--text-muted); font-size: 12px; margin-top: 4px; }

  .card .csub { color: var(--text-secondary); font-size: 12px; margin: 0 0 10px; }
  .charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }

  .chart { position: relative; }
  .chart svg { display: block; width: 100%; height: auto; overflow: visible; }
  .tick text { fill: var(--text-muted); font-size: 11px; }
  .tick line { stroke: var(--grid); stroke-width: 1; }
  .baseline { stroke: var(--baseline); stroke-width: 1; }
  .series-line { fill: none; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .end-dot { stroke: var(--surface-1); stroke-width: 2; }
  .crosshair { stroke: var(--baseline); stroke-width: 1; opacity: 0; }
  .hover-dot { stroke: var(--surface-1); stroke-width: 2; opacity: 0; }

  .tooltip {
    position: absolute; pointer-events: none; opacity: 0; transform: translate(-50%, -120%);
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;

  .tooltip .tkey { color: var(--text-secondary); }
  .tooltip .tdate { color: var(--text-muted); display: block; margin-bottom: 2px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: right; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; }
  th { color: var(--text-secondary); font-weight: 500; font-size: 12px; }
  td.num { font-variant-numeric: tabular-nums; }
  td.rank { color: var(--text-muted); width: 28px; }
  a.repo { color: var(--text-primary); text-decoration: none; }
  a.repo:hover { text-decoration: underline; }
  .spark { width: 88px; height: 22px; display: block; }
  .table-scroll { overflow-x: auto; }

  .empty { text-align: center; color: var(--text-secondary); padding: 60px 20px; }
  details.rawdata { margin-top: 8px; font-size: 12px; color: var(--text-secondary); }
  details.rawdata summary { cursor: pointer; }

  }

  // ---- KPI tiles -----------------------------------------------------------
  function totalStars() {
    return DATA.repos.reduce(function (s, r) { return s + (r.stars || 0); }, 0);
  }
  function renderTiles(container) {
    var t = DATA.totals[state.period];
    var tiles = el("div", "tiles");
    tiles.appendChild(tile("累計ビュー (unique)", compact(t.views_unique), "hero", commas(t.views_total) + " total"));
    tiles.appendChild(tile("累計クローン (unique)", compact(t.clones_unique), "", commas(t.clones_total) + " total"));
    tiles.appendChild(tile("スター合計", compact(totalStars()), "", "全リポジトリ"));
    tiles.appendChild(tile("追跡リポジトリ", commas(DATA.repos.length), "", "非fork"));
    container.appendChild(tiles);
  }
  function tile(label, value, extraCls, unit) {
    var d = el("div", "tile" + (extraCls ? " " + extraCls : ""));
    d.appendChild(el("div", "label", label));
    d.appendChild(el("div", "value", value));
    if (unit) d.appendChild(el("div", "unit", unit));
    return d;
  }

  // ---- line chart (single series, crosshair + tooltip) ---------------------
  function lineChart(points, opts) {
    var W = 480, H = 200, padL = 44, padR = 16, padT = 12, padB = 26;
    var wrap = el("div", "chart");
    var svgNS = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("viewBox", "0 0 " + W + " " + H);
    svg.setAttribute("role", "img");
    svg.setAttribute("aria-label", opts.label);

    var innerW = W - padL - padR, innerH = H - padT - padB;
    var n = points.length;
    var maxV = 1;
    points.forEach(function (p) { if (p[opts.key] > maxV) maxV = p[opts.key]; });
    maxV = niceMax(maxV);

    function x(i) { return padL + (n <= 1 ? innerW / 2 : (i / (n - 1)) * innerW); }
    function y(v) { return padT + innerH - (v / maxV) * innerH; }

    // gridlines + y ticks (0, mid, max)
    [0, maxV / 2, maxV].forEach(function (v) {
      var g = document.createElementNS(svgNS, "g"); g.setAttribute("class", "tick");
      var ln = document.createElementNS(svgNS, "line");
      ln.setAttribute("x1", padL); ln.setAttribute("x2", W - padR);
      ln.setAttribute("y1", y(v)); ln.setAttribute("y2", y(v));
      g.appendChild(ln);
      var tx = document.createElementNS(svgNS, "text");
      tx.setAttribute("x", padL - 6); tx.setAttribute("y", y(v) + 3);
      tx.setAttribute("text-anchor", "end");
      tx.textContent = compact(Math.round(v));
      g.appendChild(tx);
      svg.appendChild(g);
    });

    // baseline
    var base = document.createElementNS(svgNS, "line");
    base.setAttribute("class", "baseline");
    base.setAttribute("x1", padL); base.setAttribute("x2", W - padR);
    base.setAttribute("y1", y(0)); base.setAttribute("y2", y(0));
    svg.appendChild(base);

    // x labels (first / last)
    if (n) {
      [[0, "start"], [n - 1, "end"]].forEach(function (pair) {
        var i = pair[0];
        var tx = document.createElementNS(svgNS, "text");
        tx.setAttribute("class", "");
        tx.setAttribute("x", x(i)); tx.setAttribute("y", H - 8);
        tx.setAttribute("text-anchor", pair[1] === "start" ? "start" : "end");
        tx.setAttribute("fill", "var(--text-muted)");
        tx.setAttribute("font-size", "11");
        tx.textContent = points[i].date.slice(5);
        svg.appendChild(tx);
      });
    }

    // line path
    var d = "";
    points.forEach(function (p, i) { d += (i ? "L" : "M") + x(i).toFixed(1) + " " + y(p[opts.key]).toFixed(1); });
    if (n === 1) { d += "L" + x(0).toFixed(1) + " " + y(points[0][opts.key]).toFixed(1); }
    var path = document.createElementNS(svgNS, "path");
    path.setAttribute("class", "series-line");
    path.setAttribute("d", d);
    path.setAttribute("stroke", opts.color);
    svg.appendChild(path);

    // end dot
    if (n) {
      var dot = document.createElementNS(svgNS, "circle");
      dot.setAttribute("class", "end-dot");
      dot.setAttribute("cx", x(n - 1)); dot.setAttribute("cy", y(points[n - 1][opts.key]));
      dot.setAttribute("r", 4); dot.setAttribute("fill", opts.color);
      svg.appendChild(dot);
    }

    // crosshair + hover dot
    var cross = document.createElementNS(svgNS, "line");
    cross.setAttribute("class", "crosshair");
    cross.setAttribute("y1", padT); cross.setAttribute("y2", padT + innerH);
    svg.appendChild(cross);
    var hdot = document.createElementNS(svgNS, "circle");
    hdot.setAttribute("class", "hover-dot"); hdot.setAttribute("r", 4);
    hdot.setAttribute("fill", opts.color);
    svg.appendChild(hdot);

    wrap.appendChild(svg);
    var tip = el("div", "tooltip");
    wrap.appendChild(tip);

    function moveTo(clientX) {
      if (!n) return;
      var rect = svg.getBoundingClientRect();
      var px = (clientX - rect.left) / rect.width * W;
      var i = Math.round(((px - padL) / innerW) * (n - 1));
      i = Math.max(0, Math.min(n - 1, i));
      var p = points[i];
      cross.setAttribute("x1", x(i)); cross.setAttribute("x2", x(i));
      cross.style.opacity = 1;
      hdot.setAttribute("cx", x(i)); hdot.setAttribute("cy", y(p[opts.key]));
      hdot.style.opacity = 1;
      tip.innerHTML = "";
      tip.appendChild(el("span", "tdate", p.date));
      var val = el("span", "tval", commas(p[opts.key])); tip.appendChild(val);
      tip.appendChild(document.createTextNode(" "));
      tip.appendChild(el("span", "tkey", opts.unit));
      tip.style.left = (x(i) / W * 100) + "%";
      tip.style.top = (y(p[opts.key]) / H * 100) + "%";
      tip.style.opacity = 1;
    }
    function hide() { cross.style.opacity = 0; hdot.style.opacity = 0; tip.style.opacity = 0; }
    svg.addEventListener("pointermove", function (e) { moveTo(e.clientX); });
    svg.addEventListener("pointerleave", hide);

    return wrap;
  }

  function niceMax(v) {
    if (v <= 5) return 5;
    var pow = Math.pow(10, Math.floor(Math.log10(v)));
    var f = v / pow;
    var nf = f <= 1 ? 1 : f <= 2 ? 2 : f <= 5 ? 5 : 10;
    return nf * pow;
  }

  // ---- sparkline (mini, non-interactive) -----------------------------------
  function sparkline(points, key, color) {
    var W = 88, H = 22, pad = 2, svgNS = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("class", "spark"); svg.setAttribute("viewBox", "0 0 " + W + " " + H);
    svg.setAttribute("aria-hidden", "true");
    var n = points.length; if (!n) return svg;
    var maxV = 1; points.forEach(function (p) { if (p[key] > maxV) maxV = p[key]; });
    function x(i) { return pad + (n <= 1 ? (W - 2 * pad) / 2 : (i / (n - 1)) * (W - 2 * pad)); }
    function y(v) { return pad + (H - 2 * pad) - (v / maxV) * (H - 2 * pad); }
    var d = "";
    points.forEach(function (p, i) { d += (i ? "L" : "M") + x(i).toFixed(1) + " " + y(p[key]).toFixed(1); });
    var path = document.createElementNS(svgNS, "path");
    path.setAttribute("d", d); path.setAttribute("fill", "none");
    path.setAttribute("stroke", color); path.setAttribute("stroke-width", "1.5");
    path.setAttribute("stroke-linejoin", "round"); path.setAttribute("stroke-linecap", "round");
    svg.appendChild(path);
    return svg;
  }

  // ---- ranking table -------------------------------------------------------
  function repoByName() {
    var m = {}; DATA.repos.forEach(function (r) { m[r.name] = r; }); return m;
  }
  function renderTable(container) {
    var map = repoByName();
    var rows = DATA.ranking[state.period];
    var viewsColor = getComputedStyle(document.body).getPropertyValue("--series-views").trim();

    var scroll = el("div", "table-scroll");
    var table = el("table");
    var thead = el("thead"), htr = el("tr");
    ["", "リポジトリ", "views (u)", "views", "clones (u)", "★", "推移 (views)"].forEach(function (h, i) {
      var th = el("th", null, h); if (i >= 2 && i <= 5) th.classList.add("num"); htr.appendChild(th);
    });
    thead.appendChild(htr); table.appendChild(thead);

    var tbody = el("tbody");
    rows.forEach(function (row, idx) {
      var repo = map[row.name] || { series: [], stars: 0, totals: {} };
      var tot = (repo.totals[state.period]) || { clones_unique: 0 };
      var tr = el("tr");
      tr.appendChild(el("td", "rank", String(idx + 1)));

      var nameTd = el("td");
      var shortName = row.name.indexOf("/") >= 0 ? row.name.split("/").slice(1).join("/") : row.name;
      var a = el("a", "repo", shortName);
      a.href = "https://github.com/" + row.name;
      a.title = row.name;
      a.rel = "noopener";
      nameTd.appendChild(a);
      tr.appendChild(nameTd);

      tr.appendChild(el("td", "num", commas(row.views_unique)));
      tr.appendChild(el("td", "num", commas(row.views_total)));
      tr.appendChild(el("td", "num", commas(tot.clones_unique)));
      tr.appendChild(el("td", "num", repo.stars ? commas(repo.stars) : "–"));

      var sparkTd = el("td");
      sparkTd.appendChild(sparkline(sliceSeries(repo.series, state.period), "views_total", viewsColor));
      tr.appendChild(sparkTd);

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    scroll.appendChild(table);
    container.appendChild(scroll);
  }

  // ---- render --------------------------------------------------------------
  function render() {
    var app = document.getElementById("app");
    app.innerHTML = "";

    if (!DATA.reference_date) {
      app.appendChild(el("div", "empty", "まだデータがありません。日次ワークフローの初回スナップショットをお待ちください。"));
      return;
    }

    renderTiles(app);

    var series = sliceSeries(DATA.aggregate_series, state.period);
    var viewsColor = getComputedStyle(document.body).getPropertyValue("--series-views").trim();
    var clonesColor = getComputedStyle(document.body).getPropertyValue("--series-clones").trim();

    var card = el("div", "card");
    card.appendChild(el("h2", null, "閲覧の推移(全リポジトリ合計)"));
    card.appendChild(el("p", "csub", "1日あたりの合計。ポイントにカーソルを合わせると値を表示。"));
    var charts = el("div", "charts");
    var c1 = el("div"); c1.appendChild(el("div", "csub", "Views (total/day)"));
    c1.appendChild(lineChart(series, { key: "views_total", color: viewsColor, label: "日次ビュー合計", unit: "views" }));
    var c2 = el("div"); c2.appendChild(el("div", "csub", "Clones (total/day)"));
    c2.appendChild(lineChart(series, { key: "clones_total", color: clonesColor, label: "日次クローン合計", unit: "clones" }));
    charts.appendChild(c1); charts.appendChild(c2);
    card.appendChild(charts);

    var det = el("details", "rawdata");
    det.appendChild(el("summary", null, "データ表を表示"));
    det.appendChild(dataTable(series));
    card.appendChild(det);
    app.appendChild(card);

    var tcard = el("div", "card");
    tcard.appendChild(el("h2", null, "リポジトリ別ランキング"));
    tcard.appendChild(el("p", "csub", "選択期間の unique views 降順。リポジトリ名クリックで個別レポートへ。"));
    renderTable(tcard);
    app.appendChild(tcard);
  }

  function dataTable(series) {
    var scroll = el("div", "table-scroll");
    var table = el("table");
    var htr = el("tr");
    ["日付", "views", "views (u)", "clones", "clones (u)"].forEach(function (h, i) {
      var th = el("th", null, h); if (i) th.classList.add("num"); htr.appendChild(th);
    });
    var thead = el("thead"); thead.appendChild(htr); table.appendChild(thead);
    var tbody = el("tbody");
    series.forEach(function (p) {
      var tr = el("tr");
      tr.appendChild(el("td", null, p.date));
      ["views_total", "views_unique", "clones_total", "clones_unique"].forEach(function (k) {
        tr.appendChild(el("td", "num", commas(p[k])));
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    scroll.appendChild(table);
    return scroll;
  }

  // ---- chrome --------------------------------------------------------------
  function renderSub() {
    var sub = document.getElementById("sub");
    sub.innerHTML = "";
    if (DATA.reference_date) {
      sub.appendChild(document.createTextNode("最新データ: " + DATA.reference_date));
      var d1 = el("span", "dot", "•"); sub.appendChild(d1);
    }
    sub.appendChild(document.createTextNode("生成: " + DATA.generated_at));
  }

  function initControls() {
    document.getElementById("controls").hidden = !DATA.reference_date;
    var periodButtons = document.querySelectorAll("#period button");
    function syncPressed() {
      periodButtons.forEach(function (b) {
        b.setAttribute("aria-pressed", b.dataset.period === state.period ? "true" : "false");
      });
    }
    periodButtons.forEach(function (b) {
      b.addEventListener("click", function () { state.period = b.dataset.period; syncPressed(); render(); });
    });
    syncPressed();

    document.getElementById("theme-toggle").addEventListener("click", function () {
      var root = document.documentElement;
      var cur = root.getAttribute("data-theme");
      var next = cur === "dark" ? "light" : cur === "light" ? null : "dark";
      if (next) root.setAttribute("data-theme", next); else root.removeAttribute("data-theme");
      render(); // series colors are read from CSS vars
    });
  }

  renderSub();
  initControls();
  render();
})();
</script>
</body>
</html>
